# ─────────────────────────────────────────────────────────────
#  Orael — Docker Compose
#  One-command deployment: `docker compose up -d`
# ─────────────────────────────────────────────────────────────

services:
  orael:
    build:
      context: .
      args:
        - VITE_ADSGRAM_BLOCK_ID=${VITE_ADSGRAM_BLOCK_ID}
        - VITE_ADSGRAM_TASK_BLOCK_ID=${VITE_ADSGRAM_TASK_BLOCK_ID}
        - VITE_DEV_MODE=${VITE_DEV_MODE}
    image: orael-app:latest
    container_name: orael-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    volumes:
      - orael-data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    image: orael-app:latest
    container_name: orael-bot
    restart: unless-stopped
    command: ["node", "server/bot.js"]
    healthcheck:
      disable: true
    env_file:
      - .env
    volumes:
      - orael-data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
    depends_on:
      - orael
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: orael-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - orael-caddy-data:/data
      - orael-caddy-config:/config
    depends_on:
      - orael
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  orael-data:
    driver: local
  orael-caddy-data:
    driver: local
  orael-caddy-config:
    driver: local
