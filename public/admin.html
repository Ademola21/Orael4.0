<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Orael Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg-0: #0a0e1a; --bg-1: #0f141f; --bg-2: #161c2c; --bg-3: #1e2538;
  --ink: #f8fafc; --ink-soft: #cbd5e1; --ink-mute: #94a3b8; --ink-faint: #64748b;
  --gold-1: #fbbf24; --gold-2: #f59e0b; --gold-3: #d97706;
  --emerald: #10b981; --ruby: #ef4444; --sapphire: #3b82f6; --violet: #8b5cf6;
  --line: rgba(255,255,255,0.06); --line-strong: rgba(255,255,255,0.12);
  --font-display: "Space Grotesk", system-ui, sans-serif;
  --font-body: "Inter", system-ui, sans-serif;
  --font-mono: "Space Mono", monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body); background: var(--bg-0); color: var(--ink);
  min-height: 100vh; padding: 0;
}
body::before {
  content: ""; position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(59,130,246,0.08), transparent 55%),
    radial-gradient(90% 60% at 85% 8%, rgba(251,191,36,0.04), transparent 50%),
    var(--bg-0);
}
.admin-header {
  padding: 18px 24px; background: var(--bg-1); border-bottom: 1px solid var(--line-strong);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.admin-brand { display: flex; align-items: center; gap: 10px; }
.admin-brand svg { width: 28px; height: 28px; color: var(--gold-1); }
.admin-brand h1 { font-family: var(--font-display); font-size: 18px; font-weight: 700; }
.admin-brand h1 b { color: var(--gold-1); }
.admin-tabs {
  display: flex; gap: 4px; padding: 4px;
  background: var(--bg-2); border-radius: 12px;
}
.admin-tab {
  padding: 8px 16px; border: none; background: none; cursor: pointer;
  color: var(--ink-mute); font-family: var(--font-display); font-weight: 600; font-size: 13px;
  border-radius: 8px; transition: all 0.2s;
}
.admin-tab.active { background: var(--bg-3); color: var(--gold-1); }
.admin-container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.admin-section { display: none; }
.admin-section.active { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: linear-gradient(155deg, var(--bg-2), var(--bg-1));
  border: 1px solid var(--line-strong); border-radius: 16px;
  padding: 18px;
}
.stat-label { font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.1em; }
.stat-value { font-family: var(--font-display); font-weight: 700; font-size: 24px; margin-top: 6px; color: var(--ink); }
.stat-value.gold { color: var(--gold-1); }
.stat-value.emerald { color: var(--emerald); }
.stat-value.ruby { color: var(--ruby); }
.stat-sub { font-size: 11px; color: var(--ink-mute); margin-top: 4px; font-family: var(--font-mono); }

.card {
  background: linear-gradient(155deg, var(--bg-2), var(--bg-1));
  border: 1px solid var(--line-strong); border-radius: 16px;
  padding: 20px; margin-bottom: 16px;
}
.card-title { font-family: var(--font-display); font-weight: 600; font-size: 16px; margin-bottom: 14px; color: var(--ink); }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--line); font-size: 13px; }
th { font-family: var(--font-display); font-weight: 600; color: var(--ink-mute); text-transform: uppercase; font-size: 11px; letter-spacing: 0.08em; }
td { color: var(--ink-soft); }
tr:hover { background: rgba(255,255,255,0.02); }

.btn {
  padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer;
  font-family: var(--font-display); font-weight: 600; font-size: 12px;
  transition: all 0.15s;
}
.btn-primary { background: linear-gradient(180deg, var(--gold-1), var(--gold-2)); color: #1a0f06; }
.btn-danger { background: var(--ruby); color: #fff; }
.btn-success { background: var(--emerald); color: #fff; }
.btn-ghost { background: var(--bg-3); color: var(--ink-soft); border: 1px solid var(--line-strong); }
.btn:hover { filter: brightness(1.1); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

input, select, textarea {
  background: var(--bg-0); border: 1px solid var(--line-strong);
  border-radius: 8px; padding: 8px 12px; color: var(--ink);
  font-family: var(--font-body); font-size: 13px; outline: none;
}
input:focus { border-color: var(--gold-2); }

.search-bar { display: flex; gap: 10px; margin-bottom: 14px; }
.search-bar input { flex: 1; }

.pagination { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 14px; }
.pg-info { font-size: 12px; color: var(--ink-mute); font-family: var(--font-mono); }

.role-badge { padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.role-badge.admin { background: rgba(239,68,68,0.15); color: var(--ruby); }
.role-badge.mod { background: rgba(139,92,246,0.15); color: var(--violet); }
.role-badge.user { background: rgba(148,163,184,0.15); color: var(--ink-mute); }

.empty-state { text-align: center; padding: 40px 20px; color: var(--ink-faint); font-size: 14px; }
.gate {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 80vh; text-align: center; padding: 30px;
}
.gate h2 { font-family: var(--font-display); font-size: 24px; color: var(--ruby); margin-bottom: 12px; }
.gate p { color: var(--ink-mute); max-width: 400px; line-height: 1.6; margin-bottom: 24px; }
.gate a { color: var(--gold-1); text-decoration: none; font-weight: 600; }

.modal-veil {
  position: fixed; inset: 0; z-index: 100; display: none;
  align-items: center; justify-content: center;
  background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
  padding: 20px;
}
.modal-veil.show { display: flex; }
.modal {
  width: 100%; max-width: 500px;
  background: linear-gradient(155deg, var(--bg-2), var(--bg-1));
  border: 1px solid var(--line-strong); border-radius: 20px;
  padding: 24px;
}
.modal h3 { font-family: var(--font-display); font-size: 18px; margin-bottom: 16px; }
.modal-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
.modal-row label { flex: 0 0 120px; font-size: 13px; color: var(--ink-mute); }
.modal-row input, .modal-row select { flex: 1; }
.perms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
.perm-check { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--bg-0); border-radius: 8px; cursor: pointer; }
.perm-check input { width: auto; }
.perm-check label { font-size: 12px; color: var(--ink-soft); cursor: pointer; flex: 1; }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--bg-3); border: 1px solid var(--line-strong);
  border-radius: 100px; padding: 12px 20px;
  font-size: 13px; font-weight: 600; z-index: 200;
  animation: toastIn 0.3s ease;
}
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body>

<div class="admin-header">
  <div class="admin-brand">
    <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2.4"/><path d="M20 6 L20 20 L30 26" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/><circle cx="20" cy="20" r="3.6" fill="currentColor"/></svg>
    <h1>OR<b>AEL</b> Admin</h1>
  </div>
  <div class="admin-tabs">
    <button class="admin-tab active" data-section="dashboard">Dashboard</button>
    <button class="admin-tab" data-section="users">Users</button>
    <button class="admin-tab" data-section="withdrawals">Withdrawals</button>
    <button class="admin-tab" data-section="transactions">Transactions</button>
  </div>
</div>

<div id="gate" class="gate" style="display:none">
  <h2>Access Denied</h2>
  <p id="gateMsg">You don't have admin access. Open this page from inside the Telegram bot as an admin user.</p>
  <a href="https://t.me/Orael_bot">← Back to Orael bot</a>
</div>

<div id="panel" class="admin-container" style="display:none">

  <!-- DASHBOARD -->
  <div class="admin-section active" id="section-dashboard">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="card">
      <div class="card-title">Quick Actions</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="loadSection('withdrawals')">Process withdrawals (<span id="pendingCount">0</span>)</button>
        <button class="btn btn-ghost" onclick="loadSection('users')">Manage users</button>
        <button class="btn btn-ghost" onclick="loadSection('transactions')">View transactions</button>
      </div>
    </div>
  </div>

  <!-- USERS -->
  <div class="admin-section" id="section-users">
    <div class="card">
      <div class="card-title">User Management</div>
      <div class="search-bar">
        <input type="text" id="userSearch" placeholder="Search by name, username, or Telegram ID..." />
        <button class="btn btn-primary" onclick="loadUsers(1)">Search</button>
      </div>
      <div id="usersTable"></div>
      <div class="pagination" id="usersPagination"></div>
    </div>
  </div>

  <!-- WITHDRAWALS -->
  <div class="admin-section" id="section-withdrawals">
    <div class="card">
      <div class="card-title">Withdrawal Requests</div>
      <div class="search-bar">
        <select id="withdrawalStatus">
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
          <option value="rejected">Rejected</option>
        </select>
        <button class="btn btn-primary" onclick="loadWithdrawals(1)">Filter</button>
      </div>
      <div id="withdrawalsTable"></div>
      <div class="pagination" id="withdrawalsPagination"></div>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div class="admin-section" id="section-transactions">
    <div class="card">
      <div class="card-title">All Transactions</div>
      <div id="transactionsTable"></div>
      <div class="pagination" id="transactionsPagination"></div>
    </div>
  </div>

</div>

<!-- USER DETAIL MODAL -->
<div class="modal-veil" id="userModal">
  <div class="modal">
    <h3 id="userModalTitle">User Details</h3>
    <div id="userModalBody"></div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('userModal')">Close</button>
    </div>
  </div>
</div>

<!-- ADJUST BALANCE MODAL -->
<div class="modal-veil" id="balanceModal">
  <div class="modal">
    <h3>Adjust Balance</h3>
    <div class="modal-row">
      <label>User:</label>
      <span id="balUser" style="color:var(--ink-soft)"></span>
    </div>
    <div class="modal-row">
      <label>Amount:</label>
      <input type="number" id="balAmount" placeholder="e.g. 100 or -50" step="0.01" />
    </div>
    <div class="modal-row">
      <label>Reason:</label>
      <input type="text" id="balReason" placeholder="Reason for adjustment" />
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('balanceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitBalance()">Apply</button>
    </div>
  </div>
</div>

<!-- ROLE MODAL -->
<div class="modal-veil" id="roleModal">
  <div class="modal">
    <h3>Set User Role</h3>
    <div class="modal-row">
      <label>User:</label>
      <span id="roleUser" style="color:var(--ink-soft)"></span>
    </div>
    <div class="modal-row">
      <label>Role:</label>
      <select id="roleSelect">
        <option value="user">User (no access)</option>
        <option value="mod">Moderator</option>
        <option value="admin">Admin (full)</option>
      </select>
    </div>
    <div style="margin-top:14px">
      <label style="font-size:13px;color:var(--ink-mute)">Mod permissions:</label>
      <div class="perms-grid" id="permsGrid"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('roleModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitRole()">Save</button>
    </div>
  </div>
</div>

<script src="/admin.js"></script>
</body>
</html>
